# PublicVCons historical priority backlog (PROTOTYPE_PLAN.md §3.5).
#
# The plan's "suggested first ten". Each entry is machine-runnable by
# run_backlog.py via orchestrate.py when status: ready. Identifiers were
# verified against the Internet Archive metadata API; items without a
# clean, orchestrator-compatible public-domain source are honestly
# marked status: needs_source with the reason (NOT faked).
#
# Provenance rule: only public-domain / CC0 federal works. C-SPAN is
# WAF-blocked (see source profiles) so IA/NARA is the path. NARA
# gov.archives.arc.* items are the gold standard (§3.5).
#
# segment_dur caps a first pass so a daily backfill run stays tractable
# on the offline mini; raise/remove per item to ingest the full event.

items:
